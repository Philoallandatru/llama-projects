# ============================================================
# 通用配置
# ============================================================

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/jira-analysis.log"

# 工作流配置
workflow:
  # 深度分析配置
  deep_analysis:
    max_evidence_items: 10
    similarity_threshold: 0.7

  # 批量分析配置
  batch_analysis:
    max_concurrent: 5
    timeout_seconds: 300
