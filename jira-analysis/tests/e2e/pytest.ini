# Playwright E2E 测试配置

[pytest]
markers =
    e2e: End-to-end tests
    slow: Slow running tests
    ui: UI tests
    api: API tests
    integration: Integration tests

asyncio_mode = auto
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 超时设置
timeout = 300

# 日志
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率
addopts =
    --verbose
    --strict-markers
    --tb=short
    --capture=no
