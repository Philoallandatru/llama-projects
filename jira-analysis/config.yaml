# Jira Analysis 配置文件

# Jira 配置
jira:
  server: "https://your-domain.atlassian.net"
  email: "your-email@example.com"
  token: "your-jira-api-token"
  project: "YOUR_PROJECT"

# LLM 配置
llm:
  base_url: "http://127.0.0.1:1234/v1"  # LM Studio 默认地址
  model: "qwen3.5-0.8b"  # 使用快速测试模型
  temperature: 0.1
  max_tokens: 4096
  api_key: "lm-studio"  # LM Studio 不需要真实 API key
  embedding_model: "text-embedding-3-small"  # Use OpenAI-compatible name for LM Studio

# 索引配置
index:
  base_path: "../datasource/data/sources"
  # 可用的索引类型
  sources:
    - jira_kan
    - confluence
    - specs

# 本地测试模式配置
local_test:
  enabled: false  # 设为 true 使用 mock 数据
  use_mock_data: false
  mock_data_path: "./tests/fixtures"

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/jira-analysis.log"

# 工作流配置
workflow:
  # 深度分析配置
  deep_analysis:
    max_evidence_items: 10
    similarity_threshold: 0.7

  # 批量分析配置
  batch_analysis:
    max_concurrent: 5
    timeout_seconds: 300
