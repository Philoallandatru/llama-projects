# Jira Analysis 配置文件示例
# 复制此文件为 config.yaml 并填入你的实际配置

# ============================================================
# 方案 1: 使用 LM Studio + 真实数据（推荐用于本地测试）
# ============================================================

# Jira 配置（填入你的真实凭证）
jira:
  server: "https://your-company.atlassian.net"  # 你的 Jira Server URL
  email: "your-email@company.com"               # 你的邮箱
  token: "your-api-token-here"                  # 从 Jira 账户设置生成的 API Token

# LLM 配置（LM Studio）
llm:
  base_url: "http://localhost:1234/v1"  # LM Studio 默认地址
  model: "qwen2.5-14b-instruct"         # 你在 LM Studio 中加载的模型名称
  temperature: 0.1
  max_tokens: 4096
  api_key: "lm-studio"                  # LM Studio 不需要真实 key

# 索引配置
index:
  base_path: "../datasource/data/indexes"
  # 可用的索引类型（需要先用 datasource 构建）
  sources:
    - jira      # Jira issues 索引
    - specs     # 规格文档索引（PDF/Excel/Word）

# 本地测试模式（使用真实数据时设为 false）
local_test:
  enabled: false
  use_mock_data: false

