name: E2E Tests

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - 'jira-analysis/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'jira-analysis/**'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: jira-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          uv sync --extra e2e

      - name: Install Playwright browsers
        run: |
          uv run playwright install chromium
          uv run playwright install-deps

      - name: Create test environment file
        run: |
          cat > .env << EOF
          JIRA_SERVER=${{ secrets.JIRA_SERVER }}
          JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN=${{ secrets.JIRA_TOKEN }}
          LLM_BASE_URL=http://localhost:11434/v1
          LLM_MODEL=qwen2.5:14b
          LLM_TEMPERATURE=0.1
          LLM_MAX_TOKENS=4096
          INDEX_BASE_PATH=./tests/fixtures/indexes
          EOF

      - name: Create test fixtures
        run: |
          mkdir -p tests/fixtures/indexes/jira
          mkdir -p tests/fixtures/indexes/confluence
          mkdir -p tests/fixtures/indexes/specs

      - name: Run E2E tests
        run: |
          uv run pytest tests/e2e/ -v \
            --screenshot=only-on-failure \
            --video=retain-on-failure \
            --html=test-report.html \
            --self-contained-html
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            jira-analysis/test-report.html
            jira-analysis/test-results/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: jira-analysis/test-results/screenshots/
          retention-days: 7

      - name: Upload videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: jira-analysis/test-results/videos/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'jira-analysis/test-report.html';

            let comment = '## E2E Test Results\n\n';

            if (fs.existsSync(reportPath)) {
              comment += '✅ Test report generated. Download artifacts to view.\n';
            } else {
              comment += '❌ Test report not found.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
