name: jira-analysis

control-plane:
  port: 8100

default-service: deep-analysis

services:
  deep-analysis:
    name: deep-analysis
    source:
      type: local
      name: src.workflows.deep_analysis:DeepAnalysisWorkflow
    path: /deep-analysis
    port: 8101
    host: 0.0.0.0

  batch-analysis:
    name: batch-analysis
    source:
      type: local
      name: src.workflows.batch_analysis:BatchAnalysisWorkflow
    path: /batch-analysis
    port: 8102
    host: 0.0.0.0
