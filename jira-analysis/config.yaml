# Jira Analysis 配置文件

# Jira 配置
jira:
  server: "https://jira.example.com"
  email: "user@example.com"
  token: "your_token_here"

# LLM 配置
llm:
  base_url: "http://localhost:11434/v1"  # Ollama 默认地址
  model: "qwen2.5:14b"
  temperature: 0.1
  max_tokens: 4096
  api_key: "ollama"  # Ollama 不需要真实 API key，但某些客户端需要非空值

# 索引配置
index:
  base_path: "../datasource/data/indexes"
  # 可用的索引类型
  sources:
    - jira
    - confluence
    - specs

# 本地测试模式配置
local_test:
  enabled: true
  # 使用本地 mock 数据而不是真实 Jira
  use_mock_data: true
  mock_data_path: "./tests/fixtures"

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/jira-analysis.log"

# 工作流配置
workflow:
  # 深度分析配置
  deep_analysis:
    max_evidence_items: 10
    similarity_threshold: 0.7

  # 批量分析配置
  batch_analysis:
    max_concurrent: 5
    timeout_seconds: 300
